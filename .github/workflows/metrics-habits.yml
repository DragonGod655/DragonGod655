name: Metrics - Habits
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics-habits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.habits.facts.svg
          base: ""
          token: ${{ secrets.PROFILE_KEY }}
          optimize: svg
          experimental_features: --optimize-svg
          config_timezone: Asia/Bangkok
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics habits facts"
          retries: 3
          retries_delay: 300
          retries_output_action: 5
          retries_delay_output_action: 120
          plugin_habits_charts: no

          # Deep Sea Aqua Theme
          extras_css: |
            * { color: #c9d1d9 !important; }
            h1, h2, h3 { color: #00fbff !important; }
            svg { background-color: #050a10 !important; }
            .field { border-color: #1e3a5f !important; }
            section { border-color: #1e3a5f !important; }
            .row { border-color: #1e3a5f !important; }

      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.habits.charts.svg
          base: ""
          token: ${{ secrets.PROFILE_KEY }}
          optimize: svg
          experimental_features: --optimize-svg
          config_timezone: Asia/Bangkok
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics habits charts"
          retries: 3
          retries_delay: 300
          retries_output_action: 5
          retries_delay_output_action: 120
          plugin_habits_charts: yes

          # Deep Sea Aqua Theme
          extras_css: |
            * { color: #c9d1d9 !important; }
            h1, h2, h3 { color: #00fbff !important; }
            svg { background-color: #050a10 !important; }
            .field { border-color: #1e3a5f !important; }
            section { border-color: #1e3a5f !important; }
            .row { border-color: #1e3a5f !important; }

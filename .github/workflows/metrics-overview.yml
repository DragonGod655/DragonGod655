name: Metrics - Overview
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics-overview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          base: header, activity, community, repositories, metadata
          user: DragonGod655
          token: ${{ secrets.PROFILE_KEY }}
          optimize: svg
          experimental_features: --optimize-svg
          config_display: large
          config_timezone: Asia/Bangkok
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics overview"
          retries: 3
          retries_delay: 300
          retries_output_action: 5
          retries_delay_output_action: 120
          use_prebuilt_image: yes

          # 3D Isometric Calendar
          plugin_isocalendar: yes

          # Commit Streaks / Habits
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: no
          plugin_habits_trim: no

          # Languages
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Recently starred repos
          plugin_stars: yes
          plugin_stars_limit: 2

          # Activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: issue, pr, release, fork, review, ref/create

          # Layout order (matching the example screenshot)
          config_order: base.header, base.repositories, isocalendar, habits, languages, stars, base.activity, base.community, base.metadata

          # Midnight Black Theme
          extras_css: |
            * { color: #c9d1d9 !important; }
            h1, h2, h3 { color: #58a6ff !important; }
            svg { background-color: #0d1117 !important; }
            .field { border-color: #30363d !important; }
            section { border-color: #30363d !important; }
            .row { border-color: #30363d !important; }
            .calendar .day { outline-color: #30363d !important; }

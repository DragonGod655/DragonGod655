<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      /* Background */
      .bg { fill: #1a1a2e; }
      .ground { fill: #3d2b1f; }
      .grass-top { fill: #4a7c3f; }

      /* Character colors - frachlitz skin */
      .skin { fill: #c8a882; }
      .hair { fill: #5c3a1e; }
      .eye { fill: #00bcd4; }
      .jacket { fill: #1a1a1a; }
      .cyan-accent { fill: #00e5ff; }
      .shirt { fill: #f0f0f0; }
      .pants { fill: #111111; }
      .headphone { fill: #222222; }
      .hp-logo { fill: #00e5ff; }

      /* Pickaxe */
      .pick-stick { fill: #a0722a; }
      .pick-diamond { fill: #5ccfe6; }
      .pick-diamond-dark { fill: #3da8c0; }

      /* Block */
      .block-dirt { fill: #8B6A3E; }
      .block-grass { fill: #5D9B3A; }
      .block-dark { fill: #7a5c32; }

      /* Crack */
      .crack { fill: none; stroke: #222; stroke-width: 0.8; opacity: 0; }

      /* Particles */
      .particle { opacity: 0; }
      .p-dirt { fill: #8B6A3E; }
      .p-grass { fill: #5D9B3A; }

      /* Stars */
      .star { fill: #ffffff; opacity: 0.3; }

      /* === ANIMATIONS === */

      /* Arm swing */
      @keyframes swing {
        0%, 100% { transform: rotate(0deg); }
        12% { transform: rotate(-60deg); }
        20% { transform: rotate(0deg); }
        42% { transform: rotate(-60deg); }
        50% { transform: rotate(0deg); }
        72% { transform: rotate(-60deg); }
        80% { transform: rotate(0deg); }
      }
      .arm-group {
        transform-origin: 155px 116px;
        animation: swing 3s ease-in-out infinite;
      }

      /* Body bob */
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        12% { transform: translateY(-2px); }
        20% { transform: translateY(0); }
        42% { transform: translateY(-2px); }
        50% { transform: translateY(0); }
        72% { transform: translateY(-2px); }
        80% { transform: translateY(0); }
      }
      .character {
        animation: bob 3s ease-in-out infinite;
      }

      /* Block shake */
      @keyframes blockShake {
        0%, 100% { transform: translate(0, 0); }
        12% { transform: translate(2px, -1px); }
        14% { transform: translate(-1px, 0); }
        16% { transform: translate(0, 0); }
        42% { transform: translate(2px, -1px); }
        44% { transform: translate(-1px, 0); }
        46% { transform: translate(0, 0); }
        72% { transform: translate(2px, -1px); }
        74% { transform: translate(-1px, 0); }
        76% { transform: translate(0, 0); }
      }

      /* Crack progression */
      @keyframes crack1 {
        0%, 10% { opacity: 0; }
        15%, 100% { opacity: 0.7; }
      }
      @keyframes crack2 {
        0%, 40% { opacity: 0; }
        45%, 100% { opacity: 0.7; }
      }
      @keyframes crack3 {
        0%, 70% { opacity: 0; }
        75%, 88% { opacity: 0.9; }
        92%, 100% { opacity: 0; }
      }
      .crack1 { animation: crack1 3s ease infinite; }
      .crack2 { animation: crack2 3s ease infinite; }
      .crack3 { animation: crack3 3s ease infinite; }

      /* Block break and respawn */
      @keyframes blockBreak {
        0%, 86% { opacity: 1; transform: translate(0,0) scale(1); }
        88% { opacity: 1; transform: translate(2px,-1px) scale(1); }
        90% { opacity: 0; transform: translate(0,0) scale(0.7); }
        96% { opacity: 0; transform: translate(0,0) scale(0.5); }
        100% { opacity: 1; transform: translate(0,0) scale(1); }
      }
      .block-group {
        transform-origin: 215px 147px;
        animation: blockBreak 3s ease infinite;
      }

      /* Particles */
      @keyframes pf1 {
        0%, 88% { opacity: 0; transform: translate(0,0); }
        90% { opacity: 1; transform: translate(-12px, -18px); }
        100% { opacity: 0; transform: translate(-20px, -30px); }
      }
      @keyframes pf2 {
        0%, 88% { opacity: 0; transform: translate(0,0); }
        90% { opacity: 1; transform: translate(8px, -22px); }
        100% { opacity: 0; transform: translate(16px, -35px); }
      }
      @keyframes pf3 {
        0%, 88% { opacity: 0; transform: translate(0,0); }
        90% { opacity: 1; transform: translate(14px, -8px); }
        100% { opacity: 0; transform: translate(24px, -15px); }
      }
      @keyframes pf4 {
        0%, 88% { opacity: 0; transform: translate(0,0); }
        91% { opacity: 1; transform: translate(-6px, -25px); }
        100% { opacity: 0; transform: translate(-14px, -40px); }
      }
      @keyframes pf5 {
        0%, 88% { opacity: 0; transform: translate(0,0); }
        90% { opacity: 1; transform: translate(4px, 6px); }
        100% { opacity: 0; transform: translate(10px, 14px); }
      }
      @keyframes pf6 {
        0%, 89% { opacity: 0; transform: translate(0,0); }
        91% { opacity: 1; transform: translate(-10px, 4px); }
        100% { opacity: 0; transform: translate(-18px, 10px); }
      }
      .p1 { animation: pf1 3s ease infinite; }
      .p2 { animation: pf2 3s ease infinite; }
      .p3 { animation: pf3 3s ease infinite; }
      .p4 { animation: pf4 3s ease infinite; }
      .p5 { animation: pf5 3s ease infinite; }
      .p6 { animation: pf6 3s ease infinite; }

      /* Hit spark */
      @keyframes spark {
        0%, 10% { opacity: 0; }
        13% { opacity: 1; }
        18% { opacity: 0; }
        40% { opacity: 0; }
        43% { opacity: 1; }
        48% { opacity: 0; }
        70% { opacity: 0; }
        73% { opacity: 1; }
        78% { opacity: 0; }
        100% { opacity: 0; }
      }
      .spark { fill: #ffeb3b; animation: spark 3s ease infinite; }

      /* Stars twinkle */
      @keyframes twinkle {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.7; }
      }
      .s1 { animation: twinkle 2s ease-in-out infinite; }
      .s2 { animation: twinkle 3s ease-in-out infinite 0.5s; }
      .s3 { animation: twinkle 2.5s ease-in-out infinite 1s; }
      .s4 { animation: twinkle 1.8s ease-in-out infinite 1.5s; }

      /* Text glow */
      @keyframes textGlow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .title-text {
        font-family: 'Courier New', monospace;
        font-size: 11px;
        font-weight: bold;
        fill: #00e5ff;
        animation: textGlow 2s ease-in-out infinite;
      }

      /* XP orbs */
      @keyframes xpFloat {
        0%, 88% { opacity: 0; }
        91% { opacity: 1; transform: translate(0, 0); }
        100% { opacity: 0; transform: translate(-35px, -15px); }
      }
      @keyframes xpFloat2 {
        0%, 89% { opacity: 0; }
        92% { opacity: 1; transform: translate(0, 0); }
        100% { opacity: 0; transform: translate(-28px, -22px); }
      }
      .xp1 { fill: #76ff03; animation: xpFloat 3s ease infinite; }
      .xp2 { fill: #76ff03; animation: xpFloat2 3s ease infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="400" height="200"/>

  <!-- Stars -->
  <rect class="star s1" x="30" y="20" width="2" height="2" rx="1"/>
  <rect class="star s2" x="85" y="38" width="2" height="2" rx="1"/>
  <rect class="star s3" x="180" y="15" width="2" height="2" rx="1"/>
  <rect class="star s4" x="320" y="25" width="2" height="2" rx="1"/>
  <rect class="star s2" x="355" y="48" width="2" height="2" rx="1"/>
  <rect class="star s1" x="250" y="30" width="1.5" height="1.5" rx="1"/>
  <rect class="star s3" x="55" y="55" width="1.5" height="1.5" rx="1"/>
  <rect class="star s4" x="380" y="15" width="1.5" height="1.5" rx="1"/>

  <!-- Ground -->
  <rect class="grass-top" x="0" y="165" width="400" height="4"/>
  <rect class="ground" x="0" y="169" width="400" height="31"/>
  <rect fill="#352316" x="12" y="176" width="6" height="4" rx="1"/>
  <rect fill="#352316" x="55" y="181" width="4" height="3" rx="1"/>
  <rect fill="#352316" x="105" y="177" width="5" height="5" rx="1"/>
  <rect fill="#352316" x="205" y="183" width="6" height="3" rx="1"/>
  <rect fill="#352316" x="305" y="179" width="4" height="4" rx="1"/>
  <rect fill="#352316" x="365" y="176" width="5" height="3" rx="1"/>

  <!-- === CHARACTER === -->
  <g class="character">

    <!-- Legs -->
    <rect class="pants" x="130" y="148" width="10" height="16"/>
    <rect class="cyan-accent" x="130" y="157" width="2" height="7"/>
    <rect class="pants" x="142" y="148" width="10" height="16"/>
    <rect class="cyan-accent" x="150" y="157" width="2" height="7"/>
    <!-- Shoes -->
    <rect fill="#222" x="128" y="161" width="12" height="4"/>
    <rect fill="#222" x="140" y="161" width="12" height="4"/>

    <!-- Body -->
    <rect class="jacket" x="126" y="116" width="30" height="34"/>
    <rect class="shirt" x="136" y="118" width="10" height="20"/>
    <rect class="jacket" x="134" y="118" width="3" height="16"/>
    <rect class="jacket" x="145" y="118" width="3" height="16"/>
    <rect class="cyan-accent" x="126" y="116" width="30" height="2"/>
    <rect class="cyan-accent" x="126" y="130" width="2" height="6"/>
    <rect class="cyan-accent" x="154" y="130" width="2" height="6"/>

    <!-- Left arm (static) -->
    <rect class="jacket" x="114" y="116" width="12" height="26"/>
    <rect class="cyan-accent" x="114" y="116" width="12" height="2"/>
    <rect class="cyan-accent" x="114" y="134" width="2" height="6"/>
    <rect class="skin" x="116" y="140" width="8" height="5"/>

    <!-- Head -->
    <g>
      <rect class="skin" x="126" y="84" width="28" height="28"/>
      <rect class="hair" x="124" y="82" width="32" height="10"/>
      <rect class="hair" x="124" y="82" width="4" height="16"/>
      <rect class="hair" x="152" y="82" width="4" height="16"/>
      <rect class="hair" x="128" y="90" width="6" height="4"/>
      <!-- Eyes -->
      <rect class="eye" x="132" y="96" width="5" height="4"/>
      <rect class="eye" x="142" y="96" width="5" height="4"/>
      <rect fill="#006064" x="134" y="97" width="2" height="2"/>
      <rect fill="#006064" x="144" y="97" width="2" height="2"/>
      <!-- Mouth -->
      <rect fill="#a0785a" x="137" y="104" width="6" height="2"/>
      <!-- Headphones -->
      <rect class="headphone" x="122" y="90" width="5" height="12" rx="1"/>
      <rect class="headphone" x="153" y="90" width="5" height="12" rx="1"/>
      <rect class="hp-logo" x="123" y="94" width="3" height="3"/>
      <rect class="hp-logo" x="154" y="94" width="3" height="3"/>
      <rect class="headphone" x="124" y="82" width="32" height="3" rx="1"/>
    </g>

    <!-- Right arm with PICKAXE -->
    <g class="arm-group">
      <!-- Arm -->
      <rect class="jacket" x="156" y="116" width="12" height="26"/>
      <rect class="cyan-accent" x="156" y="116" width="12" height="2"/>
      <rect class="cyan-accent" x="166" y="134" width="2" height="6"/>
      <!-- Hand -->
      <rect class="skin" x="158" y="140" width="8" height="5"/>

      <!-- Pickaxe - Minecraft style diamond pickaxe -->
      <!-- Stick/handle -->
      <rect class="pick-stick" x="161" y="104" width="3" height="40"/>
      <!-- Pickaxe head (T-shape, diamond style) -->
      <!-- Top bar of the pick -->
      <rect class="pick-diamond" x="151" y="100" width="24" height="4"/>
      <!-- Left point -->
      <rect class="pick-diamond" x="149" y="97" width="4" height="3"/>
      <rect class="pick-diamond-dark" x="149" y="100" width="4" height="4"/>
      <!-- Right point -->
      <rect class="pick-diamond" x="173" y="97" width="4" height="3"/>
      <rect class="pick-diamond-dark" x="173" y="100" width="4" height="4"/>
      <!-- Center connector -->
      <rect class="pick-diamond-dark" x="159" y="97" width="7" height="3"/>
    </g>
  </g>

  <!-- === BLOCK (much closer to character) === -->
  <g class="block-group">
    <!-- Shadow -->
    <rect fill="#0a0a15" x="200" y="162" width="34" height="4" rx="1" opacity="0.3"/>

    <!-- Main block -->
    <rect class="block-dirt" x="198" y="129" width="34" height="34"/>
    <!-- Grass top -->
    <rect class="block-grass" x="198" y="129" width="34" height="8"/>
    <!-- Dirt details -->
    <rect class="block-dark" x="202" y="141" width="4" height="4"/>
    <rect class="block-dark" x="214" y="149" width="5" height="3"/>
    <rect class="block-dark" x="222" y="139" width="3" height="5"/>
    <rect class="block-dark" x="207" y="155" width="4" height="3"/>
    <!-- Stone specks -->
    <rect fill="#999" x="200" y="153" width="3" height="3"/>
    <rect fill="#999" x="225" y="146" width="3" height="2"/>
    <!-- Block outline -->
    <rect fill="none" stroke="#2a1f0e" stroke-width="1" x="198" y="129" width="34" height="34"/>
    <!-- Grid lines -->
    <line stroke="#2a1f0e" stroke-width="0.5" x1="206" y1="129" x2="206" y2="163" opacity="0.3"/>
    <line stroke="#2a1f0e" stroke-width="0.5" x1="215" y1="129" x2="215" y2="163" opacity="0.3"/>
    <line stroke="#2a1f0e" stroke-width="0.5" x1="224" y1="129" x2="224" y2="163" opacity="0.3"/>
    <line stroke="#2a1f0e" stroke-width="0.5" x1="198" y1="138" x2="232" y2="138" opacity="0.3"/>
    <line stroke="#2a1f0e" stroke-width="0.5" x1="198" y1="147" x2="232" y2="147" opacity="0.3"/>
    <line stroke="#2a1f0e" stroke-width="0.5" x1="198" y1="156" x2="232" y2="156" opacity="0.3"/>

    <!-- Cracks -->
    <path class="crack crack1" d="M207,141 L212,146 L210,151"/>
    <path class="crack crack2" d="M220,136 L217,143 L222,149 L218,155"/>
    <path class="crack crack3" d="M202,136 L207,139 M217,151 L224,156 L227,160"/>
  </g>

  <!-- Hit sparks (near block left edge) -->
  <g>
    <rect class="spark" x="194" y="133" width="3" height="3" rx="1"/>
    <rect class="spark" x="192" y="139" width="2.5" height="2.5" rx="1"/>
    <rect class="spark" x="196" y="127" width="2" height="2" rx="1"/>
  </g>

  <!-- Break particles -->
  <rect class="particle p1 p-dirt" x="212" y="146" width="5" height="5"/>
  <rect class="particle p2 p-grass" x="218" y="141" width="4" height="4"/>
  <rect class="particle p3 p-dirt" x="207" y="151" width="4" height="4"/>
  <rect class="particle p4 p-grass" x="223" y="136" width="3" height="3"/>
  <rect class="particle p5 p-dirt" x="210" y="156" width="4" height="4"/>
  <rect class="particle p6 p-dirt" x="220" y="149" width="5" height="5"/>

  <!-- XP Orbs -->
  <circle class="xp1" cx="215" cy="146" r="3"/>
  <circle class="xp2" cx="222" cy="141" r="2.5"/>

  <!-- Username -->
  <text class="title-text" x="330" y="185" text-anchor="middle">&#x26cf; frachlitz</text>

  <!-- Bottom accent line -->
  <rect fill="#00e5ff" x="0" y="198" width="400" height="2" opacity="0.3"/>
</svg>
